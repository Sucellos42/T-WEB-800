version: '3.8'
services:
  nestjs:
    build:
      context: ./epicroad-api
      dockerfile: epicroad-api/Dockerfile.dev
    ports:
      - "3000:3000"
    volumes:
      - .:/app
    environment:
      - NODE_ENV=development
      - PORT=3000
      - DATABASE_HOST=postgres
      - DATABASE_PORT=5432
      - DATABASE_USER=postgres
      - DATABASE_PASSWORD=postgres
      - DATABASE_NAME=postgres
    depends_on:
      - postgres
  vuejs:
    build:
      context: ./client
      dockerfile: Dockerfile.dev
    ports:
      - "3333:8080"
    volumes:
      - .:/app
    environment:
      - NODE_ENV=development
      - VUE_APP_API_URL=http://localhost:3000
    depends_on:
      - nestjs
